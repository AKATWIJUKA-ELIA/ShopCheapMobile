name: Sync to other repo

on:
  push:
    branches:
      - master

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to destination repo
        env:
          DESTPAT: ${{ secrets.DESTPAT }}
          DESTREPO: AKATWIJUKA-ELIA/ShopCheapMobile
          DESTBRANCH: staging
        run: |
          set -euo pipefail

          # 1) prove the secret is present WITHOUT printing it
          if [ -z "${DESTPAT}" ]; then
            echo "DESTPAT is empty (secret not injected)."
            exit 1
          fi
          echo "DESTPAT is present (length=${#DESTPAT})."

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 2) show what identity GitHub thinks the PAT is (no secret leakage)
          AUTH_HEADER="$(printf "x-access-token:%s" "$DESTPAT" | base64 -w 0)"
          curl -sS -H "Authorization: Basic $AUTH_HEADER" https://api.github.com/user | sed -n '1,40p'

          # 3) push using the PAT
          git remote remove dest 2>/dev/null || true
          git remote add dest "https://x-access-token:${DESTPAT}@github.com/${DESTREPO}.git"

          git ls-remote dest
          git push --force dest "HEAD:${DESTBRANCH}"
