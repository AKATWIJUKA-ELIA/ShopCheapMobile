name: Sync to otherr repo

on:
  push:
    branches:
      - master

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to destination repo
        env:
          DESTPAT: ${{ secrets.DESTPAT }}
          DESTREPO: ${{ secrets.DESTREPO }}
          DESTBRANCH: ${{ secrets.DESTBRANCH }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add dest "https://x-access-token:${DESTPAT}@github.com/${DESTREPO}.git"
          git push --force dest HEAD:${DESTBRANCH}
